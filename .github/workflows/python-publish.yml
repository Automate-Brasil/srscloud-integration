name: Upload Python Package

on:
  release:
    types: [published] # O processo inicia quando você cria um Release no GitHub

permissions:
  contents: read

jobs:
  release-build:
    name: 🏗️ Build do Pacote
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar dependências de Build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Gerar Distribuição (sdist e wheel)
        run: python -m build

      - name: Salvar artefatos temporariamente
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    name: 🚀 Publicar no PyPI
    runs-on: ubuntu-latest
    needs: release-build
    environment:
      name: pypi
      url: https://pypi.org/project/srscloud-integration/
    permissions:
      id-token: write  # OBRIGATÓRIO para Trusted Publishing (sem senha/token manual)

    steps:
      - name: Baixar artefatos do build
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Enviar para o PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # O Trusted Publishing elimina a necessidade de configurar secrets de token
          packages-dir: dist/
